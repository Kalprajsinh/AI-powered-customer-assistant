services:
  redis:
    image: redis:7-alpine
    container_name: mg_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build: .
    container_name: mg_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./faiss_db:/app/faiss_db   
    depends_on:
      - redis

volumes:
  redis_data: